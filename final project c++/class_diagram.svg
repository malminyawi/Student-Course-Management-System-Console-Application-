<svg viewBox="0 0 820 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="600" fill="#F8F9FB" rx="12"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A2A4A">UML Class Diagram — Student Course Management System</text>

  <!-- ============ Person Class ============ -->
  <g id="person-class">
    <!-- Header -->
    <rect x="270" y="70" width="280" height="42" rx="4" fill="#1A3A6B"/>
    <text x="410" y="97" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Person</text>

    <!-- Attributes section -->
    <rect x="270" y="112" width="280" height="38" fill="#EDF2FB" stroke="#1A3A6B" stroke-width="1.5"/>
    <text x="285" y="136" font-size="13" fill="#222">
      <tspan fill="#7B3FBE">- </tspan>name : string
    </text>

    <!-- Methods section -->
    <rect x="270" y="150" width="280" height="38" rx="0" fill="#F7F9FF" stroke="#1A3A6B" stroke-width="1.5"/>
    <text x="285" y="175" font-size="13" fill="#222">
      <tspan fill="#0066AA">+ </tspan>Person(n : string)
    </text>

    <!-- Bottom border -->
    <rect x="270" y="70" width="280" height="118" rx="4" fill="none" stroke="#1A3A6B" stroke-width="2"/>
  </g>

  <!-- ============ Student Class ============ -->
  <g id="student-class">
    <!-- Header -->
    <rect x="270" y="280" width="280" height="42" rx="4" fill="#1A5E3A"/>
    <text x="410" y="307" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Student</text>

    <!-- Attributes section -->
    <rect x="270" y="322" width="280" height="90" fill="#EDF7F2" stroke="#1A5E3A" stroke-width="1.5"/>
    <text x="285" y="344" font-size="13" fill="#222"><tspan fill="#7B3FBE">- </tspan>id : int</text>
    <text x="285" y="364" font-size="13" fill="#222"><tspan fill="#7B3FBE">- </tspan>gpa : double</text>
    <text x="285" y="384" font-size="13" fill="#222"><tspan fill="#7B3FBE">- </tspan>courses : set&lt;string&gt;</text>
    <text x="285" y="404" font-size="12" fill="#555" font-style="italic">  (inherited) name : string</text>

    <!-- Methods section -->
    <rect x="270" y="412" width="280" height="150" fill="#F7FDF9" stroke="#1A5E3A" stroke-width="1.5"/>
    <text x="285" y="433" font-size="13" fill="#222"><tspan fill="#0066AA">+ </tspan>Student(i, n, g)</text>
    <text x="285" y="453" font-size="13" fill="#222"><tspan fill="#0066AA">+ </tspan>getId() : int</text>
    <text x="285" y="473" font-size="13" fill="#222"><tspan fill="#0066AA">+ </tspan>getName() : string</text>
    <text x="285" y="493" font-size="13" fill="#222"><tspan fill="#0066AA">+ </tspan>getGPA() : double</text>
    <text x="285" y="513" font-size="13" fill="#222"><tspan fill="#0066AA">+ </tspan>addCourse(c : string)</text>
    <text x="285" y="533" font-size="13" fill="#222"><tspan fill="#0066AA">+ </tspan>showCourses() : void</text>
    <text x="285" y="553" font-size="13" fill="#222"><tspan fill="#0066AA">+ </tspan>display() : void</text>

    <!-- Outer border -->
    <rect x="270" y="280" width="280" height="282" rx="4" fill="none" stroke="#1A5E3A" stroke-width="2"/>
  </g>

  <!-- ============ Inheritance Arrow ============ -->
  <!-- Line from Student up to Person -->
  <line x1="410" y1="280" x2="410" y2="188" stroke="#333" stroke-width="2" stroke-dasharray="none"/>
  <!-- Hollow triangle arrowhead pointing to Person -->
  <polygon points="410,188 400,205 420,205" fill="white" stroke="#333" stroke-width="2"/>
  <!-- Label -->
  <text x="420" y="238" font-size="12" fill="#555" font-style="italic">extends</text>

  <!-- ============ Global Container Box ============ -->
  <g id="container-box">
    <rect x="590" y="280" width="200" height="80" rx="6" fill="#FFF8E8" stroke="#C07000" stroke-width="2"/>
    <text x="690" y="304" text-anchor="middle" font-size="13" font-weight="bold" fill="#7A4500">Global Container</text>
    <text x="690" y="325" text-anchor="middle" font-size="12" fill="#333">students</text>
    <text x="690" y="343" text-anchor="middle" font-size="12" fill="#333">vector&lt;Student&gt;</text>

    <!-- Dashed line to Student -->
    <line x1="590" y1="320" x2="550" y2="380" stroke="#C07000" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="555" y="360" font-size="11" fill="#9A5500" font-style="italic">uses</text>
  </g>

  <!-- ============ Free Functions Box ============ -->
  <g id="functions-box">
    <rect x="20" y="270" width="220" height="220" rx="6" fill="#F0F4FF" stroke="#2A4A9A" stroke-width="2"/>
    <text x="130" y="296" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A2A7A">Global Functions</text>
    <!-- Divider -->
    <line x1="20" y1="304" x2="240" y2="304" stroke="#2A4A9A" stroke-width="1.5"/>
    <text x="35" y="323" font-size="12" fill="#222">addStudent()</text>
    <text x="35" y="343" font-size="12" fill="#222">removeStudent()</text>
    <text x="35" y="363" font-size="12" fill="#222">searchStudent()</text>
    <text x="35" y="383" font-size="12" fill="#222">displayAll()</text>
    <text x="35" y="403" font-size="12" fill="#222">enrollCourse()</text>
    <text x="35" y="423" font-size="12" fill="#222">showCourses()</text>
    <text x="35" y="443" font-size="12" fill="#222">sortByGPA()</text>
    <text x="35" y="463" font-size="12" fill="#222">main()</text>

    <!-- Dashed line to Student -->
    <line x1="240" y1="380" x2="270" y2="420" stroke="#2A4A9A" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="245" y="405" font-size="11" fill="#3A4AAA" font-style="italic">operates on</text>
  </g>

  <!-- ============ Legend ============ -->
  <g id="legend">
    <rect x="590" y="80" width="205" height="150" rx="6" fill="white" stroke="#AAA" stroke-width="1.2"/>
    <text x="693" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Legend</text>
    <line x1="595" y1="110" x2="790" y2="110" stroke="#AAA" stroke-width="1"/>
    <rect x="607" y="122" width="16" height="12" fill="#7B3FBE" rx="2"/>
    <text x="630" y="133" font-size="12" fill="#333">Private attribute</text>
    <rect x="607" y="144" width="16" height="12" fill="#0066AA" rx="2"/>
    <text x="630" y="155" font-size="12" fill="#333">Public method</text>
    <line x1="607" y1="172" x2="623" y2="172" stroke="#333" stroke-width="2"/>
    <polygon points="623,172 616,167 616,177" fill="white" stroke="#333" stroke-width="1.5"/>
    <text x="630" y="176" font-size="12" fill="#333">Inheritance</text>
    <line x1="607" y1="198" x2="623" y2="198" stroke="#C07000" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="630" y="202" font-size="12" fill="#333">Dependency</text>
    <text x="693" y="225" text-anchor="middle" font-size="11" fill="#888">&lt;&lt;protected&gt;&gt; shown in italic</text>
  </g>

</svg>
